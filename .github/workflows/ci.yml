name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT so the workflow can push the generated README.md back
          # to the branch. Set the secret ACTIONS_PAT in your repository
          # settings (Settings → Secrets → Actions) with a Personal Access
          # Token that has `repo` scope.
          token: ${{ secrets.ACTIONS_PAT || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build README.md
        run: npm run build

      - name: Commit updated README.md
        # Only commit when running on a push event (not on pull_request),
        # and only when the README actually changed.
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README.md is already up-to-date, nothing to commit."
          else
            git commit -m "chore: regenerate README.md from sources [skip ci]"
            git push
          fi
